<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Arena: Tournament</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #f0f0f5; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        canvas { box-shadow: 0 0 40px rgba(0, 0, 255, 0.15); border: 2px solid #222; border-radius: 8px; }
        
        #lobby { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 12px; border: 2px solid #0066ff; text-align: center; box-shadow: 0 0 20px rgba(0, 102, 255, 0.2); width: 320px; z-index: 10; position: absolute; }
        h2 { margin-top: 0; color: #0066ff; letter-spacing: 2px; }
        input, select { width: 100%; padding: 10px; margin: 12px 0; border-radius: 6px; border: 1px solid #ccc; background: #fff; color: #333; font-size: 16px; box-sizing: border-box; }
        input:focus, select:focus { border-color: #0066ff; outline: none; }
        button { width: 100%; padding: 12px; background: #0066ff; color: #fff; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0044cc; box-shadow: 0 0 15px rgba(0, 102, 255, 0.4); }
        label { display: block; text-align: left; font-size: 14px; color: #555; margin-bottom: -4px; }
    </style>
</head>
<body>

<div id="lobby">
    <h2>NEON ARENA</h2>
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Player" maxlength="12">
    
    <label for="playerColor">Color</label>
    <select id="playerColor">
        <option value="0x00ffcc">Cyan</option>
        <option value="0xff3366">Pink</option>
        <option value="0xffff00">Yellow</option>
        <option value="0x9933ff">Purple</option>
    </select>
    
    <button onclick="startGame()">DROP INTO ZONE</button>
</div>

<script>
// --- Config ---
const ABLY_KEY = 'YOUR_ABLY_API_KEY_HERE'; // <--- PUT YOUR API KEY HERE
const ROOM_NAME = 'school-arena-tournament';
const MAP_SIZE = 3000;
const KILLS_TO_WIN = 10; // First to 10 kills wins the match!

// Expanded Arsenal
const WEAPONS = {
    knife:   { name: "[1] Knife", cooldown: 250, speed: 1200, damage: 100, spread: 0, count: 1, magSize: 999, reloadTime: 0, lifespan: 40 }, 
    pistol:  { name: "[2] Pistol", cooldown: 350, speed: 800, damage: 30, spread: 0, count: 1, magSize: 12, reloadTime: 1200, lifespan: 1200 },
    smg:     { name: "[3] SMG", cooldown: 90, speed: 900, damage: 12, spread: 0.15, count: 1, magSize: 40, reloadTime: 1500, lifespan: 1200 },
    shotgun: { name: "[4] Shotgun", cooldown: 800, speed: 700, damage: 15, spread: 0.25, count: 6, magSize: 6, reloadTime: 2000, lifespan: 600 },
    sniper:  { name: "[5] Sniper (Rare)", cooldown: 1500, speed: 2500, damage: 100, spread: 0, count: 1, magSize: 1, reloadTime: 1500, lifespan: 2000 }
};

let ably, channel;
let myId = 'player_' + Math.random().toString(36).substr(2, 9);
let player, otherPlayers = {}, dummies = [];
let bullets, walls, powerups, rareWeapons;
let cursors, wasd, numKeys, reloadKey;
let lastFired = 0, lastNetUpdate = 0;
const NET_TICK_RATE = 50; 

// Match State
let myName = "Player", myColor = "0x00ffcc";
let myInventory = ['knife', 'pistol', 'smg', 'shotgun']; 
let currentWeapon = 'smg';
let ammoPool = { knife: 999, pistol: 12, smg: 40, shotgun: 6, sniper: 1 };
let isReloading = false, isDead = false, matchOver = false;

// Score Tracking
let myKills = 0;
let playerScores = {}; // Tracks everyone's kills

// UI
let ammoText, reloadText, deathText, weaponText, leaderboardText, winnerText;

function startGame() {
    if(document.getElementById('username').value.trim()) myName = document.getElementById('username').value.trim();
    myColor = document.getElementById('playerColor').value;
    document.getElementById('lobby').style.display = 'none';
    
    if (audioCtx.state === 'suspended') audioCtx.resume();
    new Phaser.Game(config);
}

const config = {
    type: Phaser.AUTO, width: 900, height: 650, backgroundColor: '#f0f0f5', 
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: { preload: preload, create: create, update: update }
};

function preload() {
    let g = this.make.graphics({x: 0, y: 0, add: false}); g.fillStyle(0xffffff, 1); g.fillCircle(20, 20, 16); g.fillStyle(0x666666, 1); g.fillRect(20, 14, 26, 12); g.generateTexture('base_player', 50, 40);
    let bg = this.make.graphics({x: 0, y: 0, add: false}); bg.fillStyle(0x333333, 1); bg.fillRoundedRect(0, 0, 16, 6, 3); bg.generateTexture('bullet', 16, 6);
    let wg = this.make.graphics({x: 0, y: 0, add: false}); wg.fillStyle(0xdddddd, 1); wg.fillRect(0, 0, 80, 80); wg.lineStyle(2, 0x999999, 1); wg.strokeRect(0, 0, 80, 80); wg.generateTexture('wall', 80, 80);
    
    let hg = this.make.graphics({x: 0, y: 0, add: false}); hg.fillStyle(0x33ff33, 1); hg.fillRect(0, 0, 20, 20); hg.fillStyle(0xffffff, 1); hg.fillRect(8, 4, 4, 12); hg.fillRect(4, 8, 12, 4); hg.generateTexture('healthPack', 20, 20);
    let ag = this.make.graphics({x: 0, y: 0, add: false}); ag.fillStyle(0x0066ff, 1); ag.fillRect(0, 0, 20, 20); ag.fillStyle(0xffffff, 1); ag.fillCircle(10, 10, 6); ag.generateTexture('ammoPack', 20, 20);
    let sg = this.make.graphics({x: 0, y: 0, add: false}); sg.fillStyle(0xff9900, 1); sg.fillRect(0, 0, 40, 15); sg.fillStyle(0xffffff, 1); sg.fillRect(30, 5, 20, 5); sg.generateTexture('sniperDrop', 50, 15);
    
    let dg = this.make.graphics({x: 0, y: 0, add: false}); dg.fillStyle(0xffffff, 1); dg.fillRect(0, 0, 40, 40); dg.lineStyle(4, 0xff0000, 1); dg.strokeRect(0, 0, 40, 40); dg.generateTexture('dummy', 40, 40);
}

function create() {
    this.physics.world.setBounds(0, 0, MAP_SIZE, MAP_SIZE);
    this.add.grid(MAP_SIZE/2, MAP_SIZE/2, MAP_SIZE, MAP_SIZE, 100, 100, 0xf0f0f5, 0, 0x0000ff, 0.1);

    ably = new Ably.Realtime({ key: ABLY_KEY, clientId: myId });
    channel = ably.channels.get(ROOM_NAME);

    walls = this.physics.add.staticGroup();
    powerups = this.physics.add.group();
    rareWeapons = this.physics.add.group();
    bullets = this.physics.add.group({ defaultKey: 'bullet' });

    for (let x = 200; x < MAP_SIZE - 200; x += 500) {
        for (let y = 200; y < MAP_SIZE - 200; y += 500) {
            if (Math.random() > 0.3) {
                walls.create(x, y, 'wall');
                if (Math.random() > 0.5) walls.create(x + 80, y, 'wall');
                if (Math.random() > 0.5) walls.create(x, y + 80, 'wall');
                if (Math.random() > 0.9) {
                    let s = rareWeapons.create(x + 40, y + 40, 'sniperDrop');
                    s.itemId = Math.random().toString(36).substr(2, 6);
                }
            }
        }
    }

    for(let i = 0; i < 5; i++) {
        let dummy = this.physics.add.sprite(MAP_SIZE/2 + (i*100) - 200, MAP_SIZE/2 + 200, 'dummy');
        dummy.setImmovable(true); dummy.health = 500; dummy.maxHealth = 500;
        dummy.healthBar = this.add.graphics();
        dummies.push(dummy);
    }

    player = this.physics.add.sprite(MAP_SIZE/2, MAP_SIZE/2, 'base_player');
    player.setCollideWorldBounds(true).setTint(parseInt(myColor));
    player.health = 100;
    
    player.nameTag = this.add.text(0, 0, myName, { fontSize: '14px', fontStyle: 'bold', fill: '#333333' }).setOrigin(0.5);
    player.healthBar = this.add.graphics();

    this.cameras.main.setBounds(0, 0, MAP_SIZE, MAP_SIZE);
    this.cameras.main.startFollow(player, true, 0.1, 0.1);

    this.physics.add.collider(player, walls);
    this.physics.add.collider(dummies, walls);
    this.physics.add.collider(bullets, walls, (bullet, wall) => {
        createHitEffect(this, bullet.x, bullet.y, '#333333', 5);
        bullet.destroy();
    });
    
    this.physics.add.overlap(player, powerups, handlePowerupPickup, null, this);
    this.physics.add.overlap(player, rareWeapons, (pl, weaponDrop) => {
        if (!myInventory.includes('sniper')) {
            myInventory.push('sniper'); switchWeapon('sniper');
            this.cameras.main.flash(200, 255, 150, 0); 
        }
        channel.publish('clearItem', { id: weaponDrop.itemId });
        weaponDrop.destroy();
    });

    // UI Setup
    weaponText = this.add.text(20, 560, `WEAPON: ${WEAPONS[currentWeapon].name}`, { fontSize: '20px', fill: '#333333', fontStyle: 'bold' }).setDepth(100).setScrollFactor(0);
    ammoText = this.add.text(20, 590, `AMMO: ${ammoPool[currentWeapon]} / ${WEAPONS[currentWeapon].magSize}`, { fontSize: '26px', fontStyle: 'bold', fill: '#0066ff' }).setDepth(100).setScrollFactor(0);
    reloadText = this.add.text(450, 325, 'RELOADING...', { fontSize: '32px', fontStyle: 'bold', fill: '#ff3366' }).setOrigin(0.5).setVisible(false).setDepth(100).setScrollFactor(0);
    deathText = this.add.text(450, 325, 'YOU DIED\nRespawning...', { fontSize: '40px', fontStyle: 'bold', fill: '#ff3366', align: 'center' }).setOrigin(0.5).setVisible(false).setDepth(100).setScrollFactor(0);
    
    // Win & Leaderboard UI
    leaderboardText = this.add.text(880, 20, "--- LEADERBOARD ---\nWaiting for players...", { fontSize: '18px', fontStyle: 'bold', fill: '#333333', align: 'right', backgroundColor: 'rgba(255,255,255,0.7)' }).setOrigin(1, 0).setPadding(10).setDepth(100).setScrollFactor(0);
    winnerText = this.add.text(450, 300, "", { fontSize: '60px', fontStyle: 'bold', fill: '#0066ff', align: 'center', stroke: '#fff', strokeThickness: 8 }).setOrigin(0.5).setVisible(false).setDepth(200).setScrollFactor(0);

    cursors = this.input.keyboard.createCursorKeys();
    wasd = this.input.keyboard.addKeys({ W: 87, S: 83, A: 65, D: 68 });
    reloadKey = this.input.keyboard.addKey(82); 
    numKeys = { 1: this.input.keyboard.addKey(49), 2: this.input.keyboard.addKey(50), 3: this.input.keyboard.addKey(51), 4: this.input.keyboard.addKey(52), 5: this.input.keyboard.addKey(53) };

    playerScores[myId] = { name: myName, kills: 0 }; // Initialize my score
    setupNetworking(this);
}

function update(time) {
    if (!player || isDead || matchOver) {
        player.setVelocity(0); // Stop moving if dead or game is over
        return; 
    }

    let speed = 300; 
    player.setVelocity(0);
    if (cursors.left.isDown || wasd.A.isDown) player.setVelocityX(-speed);
    else if (cursors.right.isDown || wasd.D.isDown) player.setVelocityX(speed);
    if (cursors.up.isDown || wasd.W.isDown) player.setVelocityY(-speed);
    else if (cursors.down.isDown || wasd.S.isDown) player.setVelocityY(speed);

    let pointer = this.input.activePointer;
    player.setRotation(Phaser.Math.Angle.Between(player.x, player.y, pointer.worldX, pointer.worldY));

    if (pointer.isDown) attemptFire(this, pointer);

    if (Phaser.Input.Keyboard.JustDown(numKeys[1]) && myInventory.includes('knife')) switchWeapon('knife');
    if (Phaser.Input.Keyboard.JustDown(numKeys[2]) && myInventory.includes('pistol')) switchWeapon('pistol');
    if (Phaser.Input.Keyboard.JustDown(numKeys[3]) && myInventory.includes('smg')) switchWeapon('smg');
    if (Phaser.Input.Keyboard.JustDown(numKeys[4]) && myInventory.includes('shotgun')) switchWeapon('shotgun');
    if (Phaser.Input.Keyboard.JustDown(numKeys[5]) && myInventory.includes('sniper')) switchWeapon('sniper');

    if (Phaser.Input.Keyboard.JustDown(reloadKey) && !isReloading && ammoPool[currentWeapon] < WEAPONS[currentWeapon].magSize) triggerReload(this);

    updateDynamicUI(player, true);
    
    // DUMMY HIT DETECTION
    dummies.forEach(dummy => {
        updateDummyUI(dummy);
        this.physics.overlap(bullets, dummy, (d, bullet) => {
            if (bullet.isMine) {
                bullet.destroy(); createHitEffect(this, bullet.x, bullet.y, myColor, 10);
                dummy.health -= WEAPONS[currentWeapon].damage;
                if(dummy.health <= 0) {
                    dummy.health = dummy.maxHealth; 
                    // Register a kill for hitting a dummy!
                    channel.publish('kill', { killerId: myId, killerName: myName, victimName: 'Dummy' });
                }
            }
        });
    });

    // PVP HIT DETECTION
    Object.keys(otherPlayers).forEach(id => {
        let enemy = otherPlayers[id];
        updateDynamicUI(enemy, false);

        if (!enemy.isDead) {
            this.physics.overlap(bullets, enemy, (enemySprite, bulletSprite) => {
                if (bulletSprite.isMine) {
                    bulletSprite.destroy(); createHitEffect(this, bulletSprite.x, bulletSprite.y, myColor, 10);
                    // Tell the network WHO shot them
                    channel.publish('hit', { targetId: id, damage: WEAPONS[currentWeapon].damage, shooterId: myId, shooterName: myName });
                }
            });
        }
    });

    if (time > lastNetUpdate + NET_TICK_RATE) {
        sendNetworkUpdate(); lastNetUpdate = time;
    }
}

function switchWeapon(newWeapon) {
    if (isReloading) return;
    currentWeapon = newWeapon;
    weaponText.setText(`WEAPON: ${WEAPONS[currentWeapon].name}`);
    updateAmmoUI();
}

function attemptFire(scene, pointer) {
    if (isReloading || isDead || matchOver) return;
    
    let time = scene.time.now;
    let weapon = WEAPONS[currentWeapon];

    if (currentWeapon === 'knife') {
        if (time > lastFired) {
            playSound('shoot'); 
            scene.tweens.add({ targets: player, angle: player.angle + 90, duration: 100, yoyo: true, ease: 'Power1' });
            
            dummies.forEach(d => { 
                if(Phaser.Math.Distance.Between(player.x, player.y, d.x, d.y) < 60) {
                    d.health -= weapon.damage;
                    createHitEffect(scene, d.x, d.y, myColor, 10);
                    if(d.health <= 0) {
                        d.health = d.maxHealth;
                        channel.publish('kill', { killerId: myId, killerName: myName, victimName: 'Dummy' });
                    }
                }
            });

            Object.keys(otherPlayers).forEach(id => {
                let enemy = otherPlayers[id];
                if (!enemy.isDead && Phaser.Math.Distance.Between(player.x, player.y, enemy.x, enemy.y) < 60) {
                    createHitEffect(scene, enemy.x, enemy.y, myColor, 10);
                    channel.publish('hit', { targetId: id, damage: weapon.damage, shooterId: myId, shooterName: myName });
                }
            });

            lastFired = time + weapon.cooldown;
        }
        return; 
    }

    if (ammoPool[currentWeapon] <= 0) { triggerReload(scene); return; }

    if (time > lastFired) {
        ammoPool[currentWeapon]--; 
        updateAmmoUI();
        playSound('shoot');
        
        scene.cameras.main.shake(50, weapon.damage * 0.0002);
        let baseAngle = Phaser.Math.Angle.Between(player.x, player.y, pointer.worldX, pointer.worldY);

        for (let i = 0; i < weapon.count; i++) {
            let spreadAngle = baseAngle + Phaser.Math.FloatBetween(-weapon.spread, weapon.spread);
            let targetX = player.x + Math.cos(spreadAngle) * 2000;
            let targetY = player.y + Math.sin(spreadAngle) * 2000;

            spawnBullet(scene, player.x, player.y, targetX, targetY, myColor, weapon.speed, spreadAngle, true, weapon.lifespan);
            if (channel) channel.publish('shoot', { x: player.x, y: player.y, targetX: targetX, targetY: targetY, color: myColor, speed: weapon.speed, angle: spreadAngle, lifespan: weapon.lifespan });
        }
        lastFired = time + weapon.cooldown;
    }
}

function spawnBullet(scene, fromX, fromY, toX, toY, colorHex, speed, angle, isMine, lifespan) {
    let startX = fromX + Math.cos(angle) * 30; 
    let startY = fromY + Math.sin(angle) * 30;
    let bullet = bullets.get(startX, startY);
    if (bullet) {
        bullet.setActive(true).setVisible(true).setTint(parseInt(colorHex)).setRotation(angle);
        bullet.isMine = isMine;
        if (speed > 1500) bullet.setScale(2, 1); else bullet.setScale(1, 1);
        scene.physics.moveTo(bullet, toX, toY, speed);
        scene.time.delayedCall(lifespan, () => { if (bullet.active) bullet.destroy(); });
    }
}

function triggerReload(scene) {
    if(WEAPONS[currentWeapon].reloadTime === 0 || matchOver) return; 
    playSound('reload');
    isReloading = true; reloadText.setVisible(true); ammoText.setFill('#ff3366');
    scene.time.delayedCall(WEAPONS[currentWeapon].reloadTime, () => {
        ammoPool[currentWeapon] = WEAPONS[currentWeapon].magSize; 
        isReloading = false; reloadText.setVisible(false); updateAmmoUI();
    });
}

function handlePowerupPickup(pl, powerup) {
    if (isDead || matchOver) return;
    if (powerup.type === 'health' && player.health < 100) {
        player.health = Math.min(100, player.health + 50);
        this.cameras.main.flash(100, 0, 255, 0);
    } else if (powerup.type === 'ammo') {
        myInventory.forEach(w => ammoPool[w] = WEAPONS[w].magSize);
        this.cameras.main.flash(100, 0, 100, 255);
        updateAmmoUI();
    }
    playSound('reload'); 
    channel.publish('clearItem', { id: powerup.itemId });
    powerup.destroy();
    sendNetworkUpdate();
}

function triggerDeath(scene) {
    isDead = true;
    player.setVisible(false).body.enable = false;
    player.healthBar.clear(); player.nameTag.setVisible(false);
    deathText.setVisible(true);

    let dropType = Math.random() > 0.5 ? 'health' : 'ammo';
    channel.publish('dropItem', { x: player.x, y: player.y, type: dropType, id: Math.random().toString(36).substr(2, 6) });
    sendNetworkUpdate();

    scene.time.delayedCall(3000, () => {
        if (matchOver) return; // Don't respawn if match is over
        isDead = false; player.health = 100;
        myInventory.forEach(w => ammoPool[w] = WEAPONS[w].magSize); 
        updateAmmoUI();
        
        player.setPosition(Math.random() * (MAP_SIZE-200) + 100, Math.random() * (MAP_SIZE-200) + 100);
        player.setVisible(true).body.enable = true;
        player.nameTag.setVisible(true); deathText.setVisible(false);
        sendNetworkUpdate();
    });
}

function triggerWinSequence(scene, winnerName) {
    matchOver = true;
    winnerText.setText(`${winnerName} WINS!`).setVisible(true);
    
    // Stop all movement
    player.setVelocity(0);
    
    // 5 second delay before restarting
    scene.time.delayedCall(5000, () => {
        matchOver = false;
        winnerText.setVisible(false);
        deathText.setVisible(false);
        
        // Reset scores
        myKills = 0;
        Object.keys(playerScores).forEach(id => playerScores[id].kills = 0);
        updateLeaderboardUI();

        // Respawn and fully heal
        isDead = false;
        player.health = 100;
        myInventory.forEach(w => ammoPool[w] = WEAPONS[w].magSize);
        updateAmmoUI();
        player.setPosition(Math.random() * (MAP_SIZE-200) + 100, Math.random() * (MAP_SIZE-200) + 100);
        player.setVisible(true).body.enable = true;
        player.nameTag.setVisible(true);
        sendNetworkUpdate();
    });
}

function setupNetworking(scene) {
    channel.subscribe('update', (msg) => {
        if (msg.clientId === myId) return; let d = msg.data;
        if (!otherPlayers[msg.clientId]) {
            let enemy = scene.physics.add.sprite(d.x, d.y, 'base_player');
            enemy.setTint(parseInt(d.color));
            enemy.nameTag = scene.add.text(0, 0, d.name, { fontSize: '13px', fontStyle: 'bold', fill: '#333333' }).setOrigin(0.5);
            enemy.healthBar = scene.add.graphics();
            otherPlayers[msg.clientId] = enemy;
        }
        let enemy = otherPlayers[msg.clientId];
        enemy.setPosition(d.x, d.y).setRotation(d.rotation);
        enemy.health = d.health; enemy.isDead = d.isDead;
        enemy.setVisible(!d.isDead); enemy.nameTag.setVisible(!d.isDead);

        // Keep leaderboard in sync if someone joins late
        if (!playerScores[msg.clientId] || playerScores[msg.clientId].kills < d.kills) {
            playerScores[msg.clientId] = { name: d.name, kills: d.kills || 0 };
            updateLeaderboardUI();
        }
    });

    channel.subscribe('shoot', (msg) => {
        if (msg.clientId === myId) return; let d = msg.data;
        playSound('shoot'); 
        spawnBullet(scene, d.x, d.y, d.targetX, d.targetY, d.color, d.speed, d.angle, false, d.lifespan);
    });

    channel.subscribe('hit', (msg) => {
        let d = msg.data;
        if (d.targetId === myId && !isDead && !matchOver) {
            player.health -= d.damage;
            scene.cameras.main.flash(50, 255, 0, 0);
            playSound('hit'); 
            if (player.health <= 0) {
                // Tell everyone WHO killed me
                channel.publish('kill', { killerId: d.shooterId, killerName: d.shooterName, victimName: myName });
                triggerDeath(scene);
            }
            else sendNetworkUpdate();
        }
    });

    // --- NEW: KILL TRACKING ---
    channel.subscribe('kill', (msg) => {
        let d = msg.data;
        if (!playerScores[d.killerId]) playerScores[d.killerId] = { name: d.killerName, kills: 0 };
        
        playerScores[d.killerId].kills++;
        if (d.killerId === myId) myKills = playerScores[myId].kills;
        
        updateLeaderboardUI();

        // Check Win Condition
        if (playerScores[d.killerId].kills >= KILLS_TO_WIN) {
            triggerWinSequence(scene, d.killerName);
        }
    });

    channel.subscribe('dropItem', (msg) => {
        let p = powerups.create(msg.data.x, msg.data.y, msg.data.type === 'health' ? 'healthPack' : 'ammoPack');
        p.type = msg.data.type; p.itemId = msg.data.id;
    });

    channel.subscribe('clearItem', (msg) => {
        powerups.getChildren().forEach(p => { if (p.itemId === msg.data.id) p.destroy(); });
        rareWeapons.getChildren().forEach(w => { if (w.itemId === msg.data.id) w.destroy(); });
    });

    channel.presence.subscribe('leave', (member) => {
        if (otherPlayers[member.clientId]) {
            otherPlayers[member.clientId].nameTag.destroy();
            otherPlayers[member.clientId].healthBar.destroy();
            otherPlayers[member.clientId].destroy();
            delete otherPlayers[member.clientId];
            delete playerScores[member.clientId]; // Remove from leaderboard
            updateLeaderboardUI();
        }
    });
    channel.presence.enter();
}

function updateLeaderboardUI() {
    // Sort players by highest kills
    let sorted = Object.values(playerScores).sort((a, b) => b.kills - a.kills).slice(0, 5); // Top 5
    
    let text = "--- GOAL: " + KILLS_TO_WIN + " KILLS ---\n\n";
    sorted.forEach((p, i) => {
        text += `${i+1}. ${p.name}: ${p.kills}\n`;
    });
    
    leaderboardText.setText(text);
}

function updateAmmoUI() {
    if (currentWeapon === 'knife') {
        ammoText.setText(`AMMO: N/A`);
        ammoText.setFill('#666666'); 
    } else {
        ammoText.setText(`AMMO: ${ammoPool[currentWeapon]} / ${WEAPONS[currentWeapon].magSize}`);
        ammoText.setFill(ammoPool[currentWeapon] === 0 ? '#ff3366' : '#0066ff');
    }
}

function createHitEffect(scene, x, y, color, size) {
    playSound('hit');
    let flash = scene.add.circle(x, y, size, parseInt(color));
    scene.tweens.add({ targets: flash, scale: 2, alpha: 0, duration: 150, onComplete: () => flash.destroy() });
}

function sendNetworkUpdate() {
    if (!channel) return;
    // Added kills to network update so late-joiners can see your score
    channel.publish('update', { x: player.x, y: player.y, rotation: player.rotation, name: myName, color: myColor, health: player.health, isDead: isDead, kills: myKills });
}

function updateDynamicUI(sprite, isLocal) {
    if (sprite.isDead || isDead) { sprite.healthBar.clear(); return; }
    sprite.nameTag.setPosition(sprite.x, sprite.y - 35);
    sprite.healthBar.clear();
    sprite.healthBar.fillStyle(0xcccccc, 1); sprite.healthBar.fillRect(sprite.x - 20, sprite.y - 25, 40, 6);
    let barColor = isLocal ? 0x0066ff : 0xff3366;
    let healthWidth = Math.max(0, (sprite.health / 100) * 40);
    sprite.healthBar.fillStyle(barColor, 1); sprite.healthBar.fillRect(sprite.x - 20, sprite.y - 25, healthWidth, 6);
}

function updateDummyUI(dummy) {
    dummy.healthBar.clear();
    dummy.healthBar.fillStyle(0xcccccc, 1); dummy.healthBar.fillRect(dummy.x - 20, dummy.y - 25, 40, 6);
    let healthWidth = Math.max(0, (dummy.health / dummy.maxHealth) * 40);
    dummy.healthBar.fillStyle(0x333333, 1); dummy.healthBar.fillRect(dummy.x - 20, dummy.y - 25, healthWidth, 6);
}

// --- 8-BIT AUDIO SYNTHESIZER ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
    if (audioCtx.state === 'suspended') return; 
    
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);

    let now = audioCtx.currentTime;

    if (type === 'shoot') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } 
    else if (type === 'hit') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, now);
        osc.frequency.exponentialRampToValueAtTime(10, now + 0.2);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
    }
    else if (type === 'reload') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.setValueAtTime(400, now + 0.1);
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
    }
}
